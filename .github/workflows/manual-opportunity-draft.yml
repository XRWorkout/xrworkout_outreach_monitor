name: Manual opportunity draft

on:
  workflow_dispatch:
    inputs:
      opportunity_id:
        description: "Supabase opportunity ID to send through the LLM draft generator"
        required: true
        type: string

jobs:
  draft:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_ollama_cloud.py
        env:
          CHEAP_LLM_ENABLED: "true"
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          LLM_POLICY_PATH: ${{ vars.LLM_POLICY_PATH || 'llm_policy.json' }}
      - run: python scripts/generate_draft_for_opportunity.py --opportunity-id "${{ inputs.opportunity_id }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHEAP_LLM_ENABLED: "true"
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          LLM_POLICY_PATH: ${{ vars.LLM_POLICY_PATH || 'llm_policy.json' }}
          LLM_NOTIFY_FALLBACKS: ${{ vars.LLM_NOTIFY_FALLBACKS || 'true' }}
          XRWORKOUT_FOUNDER_NAME: ${{ vars.XRWORKOUT_FOUNDER_NAME }}
          XRWORKOUT_SITE: https://xrworkout.ai
