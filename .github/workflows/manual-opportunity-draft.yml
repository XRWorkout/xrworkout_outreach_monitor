name: Manual opportunity draft

on:
  workflow_dispatch:
    inputs:
      opportunity_id:
        description: "Supabase opportunity ID to send through the LLM draft generator"
        required: true
        type: string

jobs:
  draft:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_codex_cli.py
        env:
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
      - run: python scripts/generate_draft_for_opportunity.py --opportunity-id "${{ inputs.opportunity_id }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          XRWORKOUT_FOUNDER_NAME: ${{ vars.XRWORKOUT_FOUNDER_NAME }}
          XRWORKOUT_SITE: https://xrworkout.ai
