name: Daily drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  drafts:
    if: github.event_name == 'workflow_dispatch' || vars.AUTOMATION_ENABLED == 'true'
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_ollama_cloud.py
        env:
          CHEAP_LLM_ENABLED: "true"
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          LLM_POLICY_PATH: ${{ vars.LLM_POLICY_PATH || 'llm_policy.json' }}
      - run: python scripts/generate_drafts.py --limit 25
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHEAP_LLM_ENABLED: "true"
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          LLM_POLICY_PATH: ${{ vars.LLM_POLICY_PATH || 'llm_policy.json' }}
          LLM_NOTIFY_FALLBACKS: ${{ vars.LLM_NOTIFY_FALLBACKS || 'true' }}
          XRWORKOUT_FOUNDER_NAME: ${{ vars.XRWORKOUT_FOUNDER_NAME }}
          XRWORKOUT_SITE: https://xrworkout.ai
