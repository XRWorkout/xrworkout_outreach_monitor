name: Daily collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

jobs:
  collect:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_codex_cli.py
        env:
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
      - run: python scripts/collect_reddit.py --limit 25
        env: &env
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      - run: python scripts/collect_youtube.py --limit 10
        env: *env
      - run: python scripts/collect_twitch.py --limit 20
        env: *env
      - run: python scripts/classify_opportunities.py --limit 75
        env: *env
      - run: python scripts/discover_creators.py --limit 75
        env: *env
