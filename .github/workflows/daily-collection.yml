name: Daily collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

jobs:
  collect:
    if: github.event_name == 'workflow_dispatch' || vars.AUTOMATION_ENABLED == 'true'
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_codex_cli.py
        env:
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
      - run: python scripts/collect_reddit_rss.py --limit 10 --max-total 75 --sleep-seconds 10
        env: &env
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          REDDIT_USER_AGENT: "${{ vars.REDDIT_USER_AGENT || 'XRWorkoutOutreachMonitor/0.1 contact: https://xrworkout.ai' }}"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
     - run: python scripts/collect_youtube.py --limit 2
        env: *env
      - run: python scripts/collect_twitch.py --limit 20
        env: *env
      - run: python scripts/classify_opportunities.py --limit 75
        env: *env
      - run: python scripts/discover_creators.py --limit 75
        env: *env
