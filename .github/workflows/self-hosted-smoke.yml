name: Self-hosted smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/check_ollama_cloud.py
        if: ${{ vars.CHEAP_LLM_ENABLED == 'true' }}
        env:
          CHEAP_LLM_ENABLED: ${{ vars.CHEAP_LLM_ENABLED || 'false' }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          LLM_POLICY_PATH: ${{ vars.LLM_POLICY_PATH || 'llm_policy.json' }}
      - run: python scripts/check_codex_cli.py
        env:
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
